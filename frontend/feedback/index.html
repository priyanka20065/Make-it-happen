<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="nav">
      <a href="/" class="brand">Student Flat Finder</a>
      <nav>
        <a data-nav href="/feedback">Feedback</a>
      </nav>
    </header>

    <section class="page-intro compact-intro feedback-intro">
      <div class="page-intro-inner feedback-intro-inner">
        <h1>We Value Your Feedback</h1>
        <p>Help us improve Student Flat Finder for everyone</p>
      </div>
    </section>

    <main class="page page-wide">
      <section class="card feedback-shell">
        <h2 class="feedback-title">Share Feedback</h2>
        <p class="muted">Tell us what worked well and what we should improve.</p>

        <article class="feedback-submitter" id="feedbackSubmitter"></article>

        <form id="feedbackForm" class="simple-form feedback-form" autocomplete="off">
          <label class="feedback-label">Overall Rating</label>
          <div class="feedback-rating-row">
            <div class="feedback-star-buttons" id="feedbackStarButtons" role="radiogroup" aria-label="Overall rating">
              <button type="button" class="feedback-star-btn active" data-rating="1" aria-label="Rate 1 star">★</button>
              <button type="button" class="feedback-star-btn active" data-rating="2" aria-label="Rate 2 stars">★</button>
              <button type="button" class="feedback-star-btn active" data-rating="3" aria-label="Rate 3 stars">★</button>
              <button type="button" class="feedback-star-btn active" data-rating="4" aria-label="Rate 4 stars">★</button>
              <button type="button" class="feedback-star-btn active" data-rating="5" aria-label="Rate 5 stars">★</button>
            </div>
            <strong id="feedbackRatingLabel">5/5</strong>
            <input type="hidden" id="feedbackRatingInput" name="rating" value="5" />
          </div>

          <label>Feedback Category
            <select name="category" required>
              <option>General Feedback</option>
              <option>UI/Design</option>
              <option>Bug Report</option>
              <option>Feature Request</option>
            </select>
          </label>

          <label>Subject *
            <input name="subject" type="text" required placeholder="Brief description of your feedback" />
          </label>

          <label>Detailed Feedback *
            <textarea name="message" rows="7" required placeholder="Please provide detailed feedback about your experience..."></textarea>
          </label>

          <div class="feedback-submit-row">
            <button class="btn btn-primary" type="submit">Submit Feedback</button>
          </div>
          <p id="feedbackStatus" class="status-text"></p>
        </form>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      const currentUser = window.AppUtils.getCurrentUser()
      const feedbackForm = document.getElementById("feedbackForm")
      const feedbackStatus = document.getElementById("feedbackStatus")
      const feedbackSubmitter = document.getElementById("feedbackSubmitter")
      const starButtons = Array.from(document.querySelectorAll(".feedback-star-btn"))
      const ratingInput = document.getElementById("feedbackRatingInput")
      const ratingLabel = document.getElementById("feedbackRatingLabel")

      function setRating(value) {
        const rating = Math.max(1, Math.min(5, Number(value || 5)))
        if (ratingInput) {
          ratingInput.value = String(rating)
        }
        if (ratingLabel) {
          ratingLabel.textContent = `${rating}/5`
        }
        starButtons.forEach((button) => {
          const buttonRating = Number(button.dataset.rating || 0)
          button.classList.toggle("active", buttonRating <= rating)
        })
      }

      starButtons.forEach((button) => {
        button.addEventListener("click", () => {
          setRating(button.dataset.rating)
        })
      })

      if (feedbackSubmitter) {
        const userName = currentUser?.name || "Guest"
        const userEmail = currentUser?.email || "-"
        const accountType = currentUser?.role === "owner" ? "Owner" : "Student"
        feedbackSubmitter.innerHTML = `
          <p><strong>Submitted by</strong></p>
          <p>${userName}</p>
          <p>${userEmail}</p>
          <p>Account Type: ${accountType}</p>
        `
      }

      setRating(5)

      feedbackForm?.addEventListener("submit", (event) => {
        event.preventDefault()
        feedbackStatus.textContent = "Thanks! Your feedback has been recorded."
        feedbackForm.reset()
      })
    </script>
  </body>
</html>
