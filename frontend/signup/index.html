<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="nav">
      <a href="/" class="brand">Student Flat Finder</a>
      <nav>
        <a data-nav href="/">Home</a>
        <a data-nav href="/browse">Browse</a>
        <a data-nav href="/signup">Signup</a>
        <a data-nav href="/login">Login</a>
      </nav>
    </header>

    <main class="page auth-page">
      <section class="auth-head">
        <h1>Create your account</h1>
        <p>Or <a href="/login">sign in to your existing account</a></p>
      </section>

      <form id="signupForm" class="simple-form auth-form" autocomplete="off">
        <fieldset class="auth-role-group">
          <legend>I am a</legend>
          <div class="auth-segment" role="radiogroup" aria-label="Select account type">
            <input id="signupIntentStudent" class="auth-segment-input" type="radio" name="intent" value="seeker" checked />
            <label for="signupIntentStudent" class="auth-segment-btn">Student</label>
            <input id="signupIntentOwner" class="auth-segment-input" type="radio" name="intent" value="owner" />
            <label for="signupIntentOwner" class="auth-segment-btn">Property Owner</label>
          </div>
        </fieldset>

        <fieldset id="signupStudentFlow" class="auth-role-group">
          <legend>As Student, I want to</legend>
          <label class="inline-radio">
            <input id="signupFlowBuy" type="radio" name="preferredRoomType" value="room-only" checked />
            Buy / Find Room
          </label>
          <label class="inline-radio">
            <input id="signupFlowRoommate" type="radio" name="preferredRoomType" value="room-with-roommates" />
            List for Roommate
          </label>
          <label id="signupUniversityWrap" class="profile-wide">University / College Name<input id="signupUniversity" name="university" type="text" placeholder="Delhi University" /></label>
        </fieldset>

        <label>Full Name<input name="name" type="text" required /></label>
        <label>Email address<input name="email" type="email" required /></label>
        <label>Password<input name="password" type="password" minlength="6" required /></label>
        <label>Confirm Password<input name="confirmPassword" type="password" minlength="6" required /></label>

        <button class="btn btn-primary auth-submit" type="submit">Create Account</button>
      </form>
      <p id="signupStatus" class="status-text auth-status"></p>
    </main>

    <script src="/js/app.js"></script>
    <script src="/js/signup.js"></script>
  </body>
</html>
